services:
  # ── PostgreSQL Database ──────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-odop_marketplace}
      POSTGRES_USER: ${DB_USER:-odop_user}
      POSTGRES_PASSWORD: ${DB_PASS:-odop_secret_2024}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-odop_user} -d ${DB_NAME:-odop_marketplace}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ODOP Application ─────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000

      # Database
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-odop_marketplace}
      DB_USER: ${DB_USER:-odop_user}
      DB_PASSWORD: ${DB_PASS:-odop_secret_2024}

      # Auth
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-long-random-secret-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}

      # Razorpay (optional – leave blank for dev simulation)
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}

      # Upload
      UPLOAD_DIR: /app/backend/uploads
      MAX_FILE_SIZE: 5242880

      # Set to "true" on first run to seed demo data
      SEED_DATA: ${SEED_DATA:-false}

      # Frontend URL (for CORS)
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5000}
    volumes:
      - uploads:/app/backend/uploads

  # ── Nginx Reverse Proxy (optional, for custom domain/SSL) ─
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    profiles:
      - with-nginx

volumes:
  pgdata:
    driver: local
  uploads:
    driver: local
