# ODOP Marketplace — Nginx Reverse Proxy
# Usage: docker compose --profile with-nginx up

upstream odop_app {
    server app:5000;
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

server {
    listen 80;
    server_name _;

    # Redirect to HTTPS in production (uncomment when SSL is ready)
    # return 301 https://$host$request_uri;

    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip compression ─────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;

    # ── Client settings ──────────────────────────────────────
    client_max_body_size 10M;

    # ── Auth API (stricter rate limit) ───────────────────────
    location /api/auth {
        limit_req zone=auth burst=10 nodelay;

        proxy_pass http://odop_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ── General API ──────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://odop_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ── Uploads (cached) ─────────────────────────────────────
    location /uploads/ {
        proxy_pass http://odop_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Cache images
        proxy_cache_valid 200 7d;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Frontend static assets ───────────────────────────────
    location /assets/ {
        proxy_pass http://odop_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Frontend SPA fallback ────────────────────────────────
    location / {
        proxy_pass http://odop_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ── Health check ─────────────────────────────────────────
    location /health {
        access_log off;
        proxy_pass http://odop_app/api/health;
    }
}

